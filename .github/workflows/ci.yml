name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Run vet
        run: make vet

      - name: Build binaries
        run: make build VERSION=ci

      - name: Run local smoke test
        run: make smoke-local VERSION=ci-smoke

      - name: Run control-plane smoke test
        run: make smoke-control-plane VERSION=ci-smoke

      - name: Build release binaries
        run: make release-build VERSION=ci

      - name: Validate Docker Compose config
        run: make compose-config

      - name: Check production hardening
        run: make production-hardening-check

      - name: Build Docker images
        run: make docker-build VERSION=ci
