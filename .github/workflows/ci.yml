name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Run race detector
        run: make race

      - name: Run vulnerability check
        run: make vulncheck

      - name: Run vet
        run: make vet

      - name: Build binaries
        run: make build VERSION=ci

      - name: Run local smoke test
        run: make smoke-local VERSION=ci-smoke

      - name: Run control-plane smoke test
        run: make smoke-control-plane VERSION=ci-smoke

      - name: Run durable smoke test
        run: make smoke-durable VERSION=ci-smoke

      - name: Install Caddy
        run: go install github.com/caddyserver/caddy/v2/cmd/caddy@v2.11.4

      - name: Run Caddy edge smoke test
        run: make smoke-caddy-edge VERSION=ci-smoke

      - name: Run WebSocket smoke test
        run: make smoke-websocket VERSION=ci-smoke

      - name: Run TLS edge smoke test
        run: make smoke-tls-edge VERSION=ci-smoke

      - name: Run capacity smoke test
        run: make smoke-capacity VERSION=ci-smoke

      - name: Run failure-injection smoke test
        run: make smoke-failure-injection VERSION=ci-smoke

      - name: Run backup/restore smoke test
        run: make smoke-backup-restore VERSION=ci-smoke

      - name: Build release binaries
        run: make release-build VERSION=ci

      - name: Generate release checksums
        run: make release-checksums

      - name: Verify release artifacts
        run: make release-verify VERSION=ci

      - name: Validate Docker Compose config
        run: make compose-config

      - name: Check production hardening
        run: make production-hardening-check

      - name: Build Docker images
        run: make docker-build VERSION=ci

      - name: Test the install script against a real published release
        run: |
          ./scripts/install.sh --version v0.16.0 --dir /tmp/porthook-install-test
          test "$(/tmp/porthook-install-test/porthook version)" = "v0.16.0"

      - name: Upload release binaries for cross-platform install tests
        uses: actions/upload-artifact@v4
        with:
          name: dist-ci
          path: dist/
          retention-days: 1

  # These jobs prove the binaries this run just cross-compiled actually
  # start on real macOS, Linux arm64, and Windows hosts, install.sh/
  # install.ps1's checksum verification works on each, and their
  # PowerShell/POSIX shell syntax is valid, none of which the Linux-amd64-
  # only `go` job can check.
  install-macos:
    name: Install script (macOS)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Test the install script against a real published release
        run: |
          ./scripts/install.sh --version v0.16.0 --dir /tmp/porthook-install-test
          test "$(/tmp/porthook-install-test/porthook version)" = "v0.16.0"

  install-linux-arm64:
    name: Install script (Linux arm64)
    needs: go
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-ci
          path: dist

      - name: Test the install script against the binaries this run built
        run: |
          ./scripts/install.sh --local-dir dist --version ci --dir /tmp/porthook-install-test
          test "$(/tmp/porthook-install-test/porthook version)" = "ci"

  install-windows:
    name: Install script (Windows)
    needs: go
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-ci
          path: dist

      - name: Test the install script against the binaries this run built
        shell: pwsh
        run: |
          ./scripts/install.ps1 -LocalDir dist -Version ci -InstallDir C:\porthook-install-test
          if ((& C:\porthook-install-test\porthook.exe version) -ne "ci") {
            Write-Error "installed version mismatch"
            exit 1
          }
