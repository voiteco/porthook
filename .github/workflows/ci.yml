name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Run race detector
        run: make race

      - name: Run vulnerability check
        run: make vulncheck

      - name: Run vet
        run: make vet

      - name: Build binaries
        run: make build VERSION=ci

      - name: Run local smoke test
        run: make smoke-local VERSION=ci-smoke

      - name: Run control-plane smoke test
        run: make smoke-control-plane VERSION=ci-smoke

      - name: Run durable smoke test
        run: make smoke-durable VERSION=ci-smoke

      - name: Install Caddy
        run: go install github.com/caddyserver/caddy/v2/cmd/caddy@v2.11.4

      - name: Run Caddy edge smoke test
        run: make smoke-caddy-edge VERSION=ci-smoke

      - name: Build release binaries
        run: make release-build VERSION=ci

      - name: Generate release checksums
        run: make release-checksums

      - name: Verify release artifacts
        run: make release-verify VERSION=ci

      - name: Validate Docker Compose config
        run: make compose-config

      - name: Check production hardening
        run: make production-hardening-check

      - name: Build Docker images
        run: make docker-build VERSION=ci
