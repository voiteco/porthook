name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Run vet
        run: make vet

      - name: Run local smoke test
        run: make smoke-local VERSION="$VERSION"

      - name: Run control-plane smoke test
        run: make smoke-control-plane VERSION="$VERSION"

      - name: Build release binaries
        run: make release-build VERSION="$VERSION"

      - name: Verify release versions
        run: |
          test "$(./dist/porthook_linux_amd64 version)" = "$VERSION"
          test "$(./dist/porthook-gateway_linux_amd64 version)" = "$VERSION"
          test "$(./dist/porthook-control-plane_linux_amd64 version)" = "$VERSION"

      - name: Generate checksums
        run: make release-checksums

      - name: Verify release artifacts
        run: make release-verify VERSION="$VERSION"

      - name: Validate Docker Compose config
        run: make compose-config

      - name: Check production hardening
        run: make production-hardening-check

      - name: Build Docker images
        run: make docker-build VERSION="$VERSION"

      - name: Extract release notes
        run: |
          awk -v version="${VERSION#v}" '
            BEGIN {
              found = 0
              target = "## [" version "]"
            }
            /^## \[/ {
              if (found) {
                exit 0
              }
              if (index($0, target) == 1) {
                found = 1
                next
              }
            }
            found {
              print
            }
            END {
              if (!found) {
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$VERSION" dist/* --title "$VERSION" --notes-file release-notes.md
