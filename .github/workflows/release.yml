name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  security-events: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Compute image metadata
        id: image_meta
        run: |
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

          # A hyphen in the tag (e.g. v1.0.0-rc.1) marks a pre-release per semver:
          # publish it under its own version tag only, never move "latest" onto it,
          # and mark the GitHub release itself as a pre-release.
          if [[ "$VERSION" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

          {
            echo "gateway_tags<<TAGS_EOF"
            echo "ghcr.io/$owner/porthook-gateway:$VERSION"
            if [ "$prerelease" = "false" ]; then
              echo "ghcr.io/$owner/porthook-gateway:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "control_plane_tags<<TAGS_EOF"
            echo "ghcr.io/$owner/porthook-control-plane:$VERSION"
            if [ "$prerelease" = "false" ]; then
              echo "ghcr.io/$owner/porthook-control-plane:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Run race detector
        run: make race

      - name: Run vulnerability check
        run: make vulncheck

      - name: Scan repository history and working tree
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build CodeQL database
        uses: github/codeql-action/autobuild@v4

      - name: Analyze CodeQL database
        uses: github/codeql-action/analyze@v4

      - name: Run vet
        run: make vet

      - name: Run local smoke test
        run: make smoke-local VERSION="$VERSION"

      - name: Run control-plane smoke test
        run: make smoke-control-plane VERSION="$VERSION"

      - name: Run durable smoke test
        run: make smoke-durable VERSION="$VERSION"

      - name: Install Caddy
        run: go install github.com/caddyserver/caddy/v2/cmd/caddy@v2.11.4

      - name: Run Caddy edge smoke test
        run: make smoke-caddy-edge VERSION="$VERSION"

      - name: Run WebSocket smoke test
        run: make smoke-websocket VERSION="$VERSION"

      - name: Run TLS edge smoke test
        run: make smoke-tls-edge VERSION="$VERSION"

      - name: Build release binaries
        run: make release-build VERSION="$VERSION"

      - name: Verify release versions
        run: |
          test "$(./dist/porthook_linux_amd64 version)" = "$VERSION"
          test "$(./dist/porthook-gateway_linux_amd64 version)" = "$VERSION"
          test "$(./dist/porthook-control-plane_linux_amd64 version)" = "$VERSION"

      - name: Generate checksums
        run: make release-checksums

      - name: Verify release artifacts
        run: make release-verify VERSION="$VERSION"

      - name: Validate Docker Compose config
        run: make compose-config

      - name: Check production hardening
        run: make production-hardening-check

      - name: Generate release binaries SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: porthook-release-sbom.spdx.json
          upload-artifact: false

      - name: Attest release binaries provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Attest release binaries SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: "dist/*"
          sbom-path: porthook-release-sbom.spdx.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push gateway image
        id: build_gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ steps.image_meta.outputs.revision }}
            BUILD_DATE=${{ steps.image_meta.outputs.created }}
          tags: ${{ steps.image_meta.outputs.gateway_tags }}
          cache-from: type=gha,scope=porthook-gateway
          cache-to: type=gha,mode=max,scope=porthook-gateway

      - name: Build and push control-plane image
        id: build_control_plane
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/control-plane/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ steps.image_meta.outputs.revision }}
            BUILD_DATE=${{ steps.image_meta.outputs.created }}
          tags: ${{ steps.image_meta.outputs.control_plane_tags }}
          cache-from: type=gha,scope=porthook-control-plane
          cache-to: type=gha,mode=max,scope=porthook-control-plane

      - name: Attest gateway image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          push-to-registry: true

      - name: Attest control-plane image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-control-plane
          subject-digest: ${{ steps.build_control_plane.outputs.digest }}
          push-to-registry: true

      - name: Generate gateway image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-gateway@${{ steps.build_gateway.outputs.digest }}
          format: spdx-json
          output-file: porthook-gateway-sbom.spdx.json
          upload-artifact: false

      - name: Attest gateway image SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-gateway
          subject-digest: ${{ steps.build_gateway.outputs.digest }}
          sbom-path: porthook-gateway-sbom.spdx.json
          push-to-registry: true

      - name: Generate control-plane image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-control-plane@${{ steps.build_control_plane.outputs.digest }}
          format: spdx-json
          output-file: porthook-control-plane-sbom.spdx.json
          upload-artifact: false

      - name: Attest control-plane image SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-control-plane
          subject-digest: ${{ steps.build_control_plane.outputs.digest }}
          sbom-path: porthook-control-plane-sbom.spdx.json
          push-to-registry: true

      - name: Extract release notes
        run: |
          awk -v version="${VERSION#v}" '
            BEGIN {
              found = 0
              target = "## [" version "]"
            }
            /^## \[/ {
              if (found) {
                exit 0
              }
              if (index($0, target) == 1) {
                found = 1
                next
              }
            }
            found {
              print
            }
            END {
              if (!found) {
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          {
            echo ""
            echo "## Container Images"
            echo ""
            echo "Pin by digest for stronger immutability than a version tag; see [Upgrading](https://github.com/${{ github.repository }}/blob/main/docs/UPGRADING.md)."
            echo ""
            echo "- \`ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-gateway@${{ steps.build_gateway.outputs.digest }}\`"
            echo "- \`ghcr.io/${{ steps.image_meta.outputs.owner }}/porthook-control-plane@${{ steps.build_control_plane.outputs.digest }}\`"
            echo ""
            echo "Every binary and image in this release has a keyless-signed build provenance and SBOM attestation, verifiable with \`gh attestation verify\`; see [Upgrading](https://github.com/${{ github.repository }}/blob/main/docs/UPGRADING.md)."
          } >> release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          if [ "${{ steps.image_meta.outputs.prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$VERSION" \
            dist/* \
            porthook-release-sbom.spdx.json \
            porthook-gateway-sbom.spdx.json \
            porthook-control-plane-sbom.spdx.json \
            --title "$VERSION" --notes-file release-notes.md $prerelease_flag
