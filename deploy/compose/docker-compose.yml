services:
  gateway:
    build:
      context: ../..
      dockerfile: server/gateway/Dockerfile
    image: porthook-gateway:dev
    environment:
      PORTHOOK_ADDR: ":8080"
      PORTHOOK_AGENT_ADDR: ":8081"
      PORTHOOK_MANAGEMENT_ADDR: ":8082"
      PORTHOOK_ROOT_DOMAIN: localhost
      PORTHOOK_PUBLIC_URL: http://localhost:8080
      PORTHOOK_STATIC_TOKEN: dev-token
      PORTHOOK_RATE_LIMIT_RPS: "60"
      PORTHOOK_RATE_LIMIT_BURST: "120"
    ports:
      - "8080:8080"
      - "8081:8081"
    expose:
      - "8082"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/porthook-gateway", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
