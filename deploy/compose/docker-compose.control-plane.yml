services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: porthook
      POSTGRES_USER: porthook
      POSTGRES_PASSWORD: ${PORTHOOK_POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porthook -d porthook"]
      interval: 5s
      timeout: 5s
      retries: 12

  control-plane:
    build:
      context: ../..
      dockerfile: server/control-plane/Dockerfile
    image: porthook-control-plane:dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORTHOOK_CONTROL_ADDR: ":8082"
      PORTHOOK_CONTROL_ADMIN_TOKEN: ${PORTHOOK_CONTROL_ADMIN_TOKEN:-change-me-admin-token}
      PORTHOOK_CONTROL_VALIDATOR_TOKEN: ${PORTHOOK_CONTROL_VALIDATOR_TOKEN:-change-me-validator-token}
      PORTHOOK_DATABASE_URL: postgres://porthook:${PORTHOOK_POSTGRES_PASSWORD:-change-me-postgres-password}@postgres:5432/porthook?sslmode=disable
      PORTHOOK_OTEL_ENABLED: ${PORTHOOK_OTEL_ENABLED:-}
      PORTHOOK_OTEL_EXPORTER: ${PORTHOOK_OTEL_EXPORTER:-}
      PORTHOOK_OTEL_PROTOCOL: ${PORTHOOK_OTEL_PROTOCOL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-}
    ports:
      - "${PORTHOOK_CONTROL_PORT:-8082}:8082"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/porthook-control-plane", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  gateway:
    build:
      context: ../..
      dockerfile: server/gateway/Dockerfile
    image: porthook-gateway:dev
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      PORTHOOK_ADDR: ":8080"
      PORTHOOK_AGENT_ADDR: ":8081"
      PORTHOOK_ROOT_DOMAIN: ${PORTHOOK_ROOT_DOMAIN:-localhost}
      PORTHOOK_PUBLIC_URL: ${PORTHOOK_PUBLIC_URL:-http://localhost:8080}
      PORTHOOK_STATIC_TOKEN: unused-static-token
      PORTHOOK_CONTROL_PLANE_URL: http://control-plane:8082
      PORTHOOK_CONTROL_PLANE_TOKEN: ${PORTHOOK_CONTROL_VALIDATOR_TOKEN:-change-me-validator-token}
      PORTHOOK_CUSTOM_DOMAIN_CACHE_TTL: ${PORTHOOK_CUSTOM_DOMAIN_CACHE_TTL:-30s}
      PORTHOOK_CUSTOM_DOMAIN_MISS_TTL: ${PORTHOOK_CUSTOM_DOMAIN_MISS_TTL:-5s}
      PORTHOOK_RATE_LIMIT_RPS: "60"
      PORTHOOK_RATE_LIMIT_BURST: "120"
      PORTHOOK_OTEL_ENABLED: ${PORTHOOK_OTEL_ENABLED:-}
      PORTHOOK_OTEL_EXPORTER: ${PORTHOOK_OTEL_EXPORTER:-}
      PORTHOOK_OTEL_PROTOCOL: ${PORTHOOK_OTEL_PROTOCOL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-}
    ports:
      - "${PORTHOOK_PUBLIC_PORT:-8080}:8080"
      - "${PORTHOOK_AGENT_PORT:-8081}:8081"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/porthook-gateway", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  postgres-data:
